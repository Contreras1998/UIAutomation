name: Cucumber BDD Tests
on:
  workflow_dispatch:
    inputs:
      browser:
        description: Browser to run BDD scenarios against
        required: true
        default: chromium
        type: choice
        options:
          - chromium
          - firefox
      os:
        description: Operating system to run tests on
        required: true
        default: ubuntu-latest
        type: choice
        options:
          - ubuntu-latest
          - windows-latest
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.os || 'ubuntu-latest' }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers on Linux
      if: runner.os == 'Linux'
      run: npx playwright install --with-deps ${{ github.event_name == 'workflow_dispatch' && inputs.browser || '' }}
    - name: Install Playwright Browsers on Windows
      if: runner.os == 'Windows'
      run: npx playwright install ${{ github.event_name == 'workflow_dispatch' && inputs.browser || '' }}
    - name: Typecheck
      run: npm run test:typecheck
    - name: Run Cucumber BDD tests
      env:
        BROWSER: ${{ github.event_name == 'workflow_dispatch' && inputs.browser || 'chromium' }}
      run: npm run test:bdd
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: cucumber-report-${{ github.event_name == 'workflow_dispatch' && inputs.os || 'ubuntu-latest' }}-${{ github.event_name == 'workflow_dispatch' && inputs.browser || 'chromium' }}
        path: reports/
        retention-days: 30
